<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Treino Profissional - VidaSaudável AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --accent: #f59e0b;
            --dark: #0f172a;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 60px; }
        .header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #10b981, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .form-wrapper {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            margin-bottom: 40px;
        }
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 30px;
        }
        .form-grid { display: grid; gap: 30px; margin-bottom: 40px; }
        .form-group { display: flex; flex-direction: column; gap: 12px; }
        label { font-weight: 600; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }
        input, select {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
            outline: none;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        select option { background: var(--dark); }
        .objetivo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 15px; }
        .objetivo-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .objetivo-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .objetivo-card.selected {
            border-color: var(--accent);
            background: rgba(245, 158, 11, 0.1);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.4);
        }
        .objetivo-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .objetivo-name { font-weight: 700; font-size: 1.1rem; }
        .nivel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 15px; }
        .nivel-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nivel-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .nivel-card.selected {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }
        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Bebas Neue', sans-serif;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(16, 185, 129, 0.6);
        }
        .results { display: none; }
        .results.show { display: block; }
        .treino-day {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            border-left: 5px solid var(--accent);
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
        .day-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--accent);
        }
        .day-muscle {
            background: rgba(245, 158, 11, 0.2);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
        }
        .exercise-list { display: grid; gap: 15px; }
        .exercise-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 50px 2fr 1fr 1fr;
            gap: 20px;
            align-items: center;
        }
        .exercise-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
        }
        .exercise-name {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .exercise-muscle-target {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }
        .exercise-sets {
            text-align: center;
            font-weight: 700;
            color: var(--primary);
        }
        .exercise-rest {
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
        .obs-section {
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--primary);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        .obs-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 3rem; }
            .objetivo-grid, .nivel-grid { grid-template-columns: 1fr; }
            .exercise-item { grid-template-columns: 1fr; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GERADOR DE TREINO</h1>
            <p>Monte sua ficha profissional completa</p>
        </div>

        <div class="form-wrapper">
            <form id="treinoForm">
                <div class="section-title">📋 Seus Dados</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" required placeholder="Digite seu nome">
                    </div>
                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                        <div>
                            <label for="idade">Idade</label>
                            <input type="number" id="idade" required placeholder="25">
                        </div>
                        <div>
                            <label for="peso">Peso (kg)</label>
                            <input type="number" id="peso" required placeholder="70">
                        </div>
                        <div>
                            <label for="altura">Altura (cm)</label>
                            <input type="number" id="altura" required placeholder="170">
                        </div>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 40px;">🎯 Seu Objetivo</div>
                <div class="objetivo-grid">
                    <div class="objetivo-card" data-objetivo="emagrecimento">
                        <div class="objetivo-icon">🔥</div>
                        <div class="objetivo-name">Emagrecimento</div>
                    </div>
                    <div class="objetivo-card" data-objetivo="definicao">
                        <div class="objetivo-icon">⚡</div>
                        <div class="objetivo-name">Definição</div>
                    </div>
                    <div class="objetivo-card" data-objetivo="hipertrofia">
                        <div class="objetivo-icon">💎</div>
                        <div class="objetivo-name">Ganho de Massa</div>
                    </div>
                </div>
                <input type="hidden" id="objetivo" required>

                <div class="section-title" style="margin-top: 40px;">📊 Seu Nível</div>
                <div class="nivel-grid">
                    <div class="nivel-card" data-nivel="iniciante">
                        <div class="objetivo-icon">🌱</div>
                        <div class="objetivo-name">Iniciante</div>
                        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 5px;">0-6 meses</p>
                    </div>
                    <div class="nivel-card" data-nivel="intermediario">
                        <div class="objetivo-icon">💪</div>
                        <div class="objetivo-name">Intermediário</div>
                        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 5px;">6-18 meses</p>
                    </div>
                    <div class="nivel-card" data-nivel="avancado">
                        <div class="objetivo-icon">🏆</div>
                        <div class="objetivo-name">Avançado</div>
                        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 5px;">+18 meses</p>
                    </div>
                </div>
                <input type="hidden" id="nivel" required>

                <button type="submit" class="submit-btn" style="margin-top: 40px;">Gerar Meu Treino</button>
            </form>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        let selectedObjetivo = '';
        let selectedNivel = '';

        // Objetivo selection
        document.querySelectorAll('.objetivo-card').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('.objetivo-card').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                selectedObjetivo = this.dataset.objetivo;
                document.getElementById('objetivo').value = selectedObjetivo;
            });
        });

        // Nível selection
        document.querySelectorAll('.nivel-card').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('.nivel-card').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                selectedNivel = this.dataset.nivel;
                document.getElementById('nivel').value = selectedNivel;
            });
        });

        // Form Submit
        document.getElementById('treinoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const objetivo = document.getElementById('objetivo').value;
            const nivel = document.getElementById('nivel').value;

            if (!objetivo || !nivel) {
                alert('Por favor, selecione seu objetivo e nível!');
                return;
            }

            gerarTreino(nome, objetivo, nivel);
        });
