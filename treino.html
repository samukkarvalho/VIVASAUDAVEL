<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Treino - VidaSaudável</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 30px;
        }
        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .form-wrapper {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 30px;
            margin-top: 40px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }
        input, select {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .card.selected {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-color: var(--primary);
        }
        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(16,185,129,0.4);
        }
        .results {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 50px;
            margin-top: 40px;
        }
        .treino-day {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .day-header {
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .day-header h2 {
            font-size: 1.8rem;
            color: var(--primary);
        }
        .exercise-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
        }
        .exercise-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            margin-bottom: 8px;
        }
        .exercise-details {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.8);
        }
        .button-group {
            text-align: center;
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-gerar, .btn-pdf {
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-gerar {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 10px 30px rgba(16,185,129,0.4);
        }
        .btn-pdf {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 10px 30px rgba(245,158,11,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="display: inline-flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.1); padding: 12px 24px; border-radius: 50px; text-decoration: none; color: white; font-weight: 600; margin-bottom: 30px; transition: all 0.3s;">
            <span style="font-size: 1.5rem;">←</span>
            Voltar para Início
        </a>

        <div class="header">
            <h1>GERADOR DE TREINO</h1>
            <p>Crie sua ficha de treino personalizada</p>
        </div>

        <div class="form-wrapper">
            <form id="treinoForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="nome" required placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label>Idade</label>
                        <input type="number" id="idade" required placeholder="25">
                    </div>
                    <div class="form-group">
                        <label>Experiência (meses)</label>
                        <input type="number" id="experiencia" required placeholder="6" min="0">
                    </div>
                </div>

                <div class="section-title">💪 Seu Biotipo</div>
                <div class="card-grid">
                    <div class="card" data-biotipo="ectomorfo">
                        <div class="card-icon">🏃</div>
                        <div class="card-title">Ectomorfo</div>
                        <small>Magro, metabolismo rápido</small>
                    </div>
                    <div class="card" data-biotipo="mesomorfo">
                        <div class="card-icon">💪</div>
                        <div class="card-title">Mesomorfo</div>
                        <small>Atlético, ganha fácil</small>
                    </div>
                    <div class="card" data-biotipo="endomorfo">
                        <div class="card-icon">🏋️</div>
                        <div class="card-title">Endomorfo</div>
                        <small>Robusto, metabolismo lento</small>
                    </div>
                </div>
                <input type="hidden" id="biotipo" required>

                <div class="section-title">🎯 Seu Objetivo</div>
                <div class="card-grid">
                    <div class="card" data-objetivo="ganho_massa">
                        <div class="card-icon">📈</div>
                        <div class="card-title">Ganho de Massa</div>
                    </div>
                    <div class="card" data-objetivo="definicao">
                        <div class="card-icon">⚡</div>
                        <div class="card-title">Definição</div>
                    </div>
                    <div class="card" data-objetivo="perda_gordura">
                        <div class="card-icon">🔥</div>
                        <div class="card-title">Perda de Gordura</div>
                    </div>
                </div>
                <input type="hidden" id="objetivo" required>

                <button type="submit" class="submit-btn">🏋️ Gerar Meu Treino</button>
            </form>
        </div>

        <div class="results" id="results" style="display:none;">
            <div style="text-align:center;margin-bottom:40px;">
                <h2 style="font-size:2.5rem;color:var(--primary);margin-bottom:10px;">✅ Seu Treino Personalizado</h2>
            </div>
            <div id="treinoList"></div>
            <div class="button-group">
                <button class="btn-gerar" onclick="gerarNovoTreino()">🔄 Gerar Outro Treino</button>
                <button class="btn-pdf" onclick="salvarTreinoPDF()">📄 Salvar PDF</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const app = initializeApp({
            apiKey: "AIzaSyCG7wlPmWepa8MVfuX4XZnxGnkxAEAbtDo",
            authDomain: "vidasaudavel-490d6.firebaseapp.com",
            projectId: "vidasaudavel-490d6"
        });

        const auth = getAuth(app);
        const db = getFirestore(app);

        const exerciciosPorGrupo = {
            peito: ['Supino Reto', 'Supino Inclinado', 'Supino Declinado', 'Peck Deck', 'Desenvolvimento na Máquina', 'Flexão', 'Supino com Halteres', 'Crossover', 'Fly com Halteres', 'Supino Smith', 'Máquina Convergente', 'Supino Máquina'],
            costas: ['Puxada Frontal', 'Puxada Costas', 'Remada Curvada', 'Remada Máquina', 'Remada Unilateral', 'Puxada Aberta', 'Face Pull', 'Barra Fixa', 'Remada Com Halteres', 'Rosca Inversa', 'Pullover', 'Remada Baixa'],
            perna: ['Agachamento Livre', 'Leg Press', 'Agachamento Smith', 'Hack Machine', 'Extensora', 'Mesa Flexora', 'Rosca Direta', 'Abdutor', 'Addutor', 'Levantamento Terra', 'Leg Press 45º', 'Agachamento Sumo', 'Passada', 'Cadeira Extensora', 'Panturrilha'],
            ombro: ['Desenvolvimento Militar', 'Elevação Lateral', 'Rosca Direta', 'Máquina Ombro', 'Encolhimento', 'Desenvolvimento Máquina', 'Elevação Frontal', 'Shoulder Press', 'Elevação Lateral Máquina', 'Remada Alta', 'Rotação Interna', 'Desenvolvimento com Halteres'],
            bíceps: ['Rosca Direta Barra', 'Rosca Direta Halteres', 'Rosca Máquina', 'Rosca Concentrada', 'Rosca Inversa', 'Rosca Diagonal', 'Rosca Inclinada', 'Máquina Biceps', 'Rosca Baixa', 'Rosca Altíssima', 'Rosca com Corda', 'Rosca Scott'],
            tríceps: ['Tríceps Corda', 'Tríceps Halteres', 'Mergulho', 'Máquina Tríceps', 'Tríceps Barra', 'Tríceps Máquina Fechada', 'Extensão Cabeça', 'Tríceps Na Máquina', 'Rosca Francesa', 'Kickback', 'Paralelas', 'Tríceps Invertido']
        };

        const estruturaTreino = {
            ectomorfo: {
                ganho_massa: {dias: 3, focus: [['peito', 'ombro'], ['costas', 'bíceps'], ['perna', 'tríceps']], sets: 3, reps: '6-8', descanso: '2-3 min'},
                definicao: {dias: 4, focus: [['peito', 'tríceps'], ['costas', 'bíceps'], ['ombro'], ['perna']], sets: 3, reps: '8-12', descanso: '45-60 seg'},
                perda_gordura: {dias: 4, focus: [['peito', 'bíceps'], ['costas', 'tríceps'], ['ombro'], ['perna']], sets: 3, reps: '10-15', descanso: '30-45 seg'}
            },
            mesomorfo: {
                ganho_massa: {dias: 4, focus: [['peito', 'ombro'], ['costas'], ['perna'], ['bíceps', 'tríceps']], sets: 4, reps: '8-12', descanso: '60-90 seg'},
                definicao: {dias: 4, focus: [['peito', 'tríceps'], ['costas', 'bíceps'], ['ombro'], ['perna']], sets: 3, reps: '10-12', descanso: '45-60 seg'},
                perda_gordura: {dias: 4, focus: [['peito'], ['costas', 'bíceps'], ['ombro', 'tríceps'], ['perna']], sets: 3, reps: '12-15', descanso: '30-45 seg'}
            },
            endomorfo: {
                ganho_massa: {dias: 4, focus: [['peito', 'bíceps'], ['costas'], ['ombro', 'tríceps'], ['perna']], sets: 4, reps: '8-10', descanso: '60-90 seg'},
                definicao: {dias: 5, focus: [['peito', 'tríceps'], ['costas'], ['ombro', 'bíceps'], ['perna'], ['abdômen']], sets: 3, reps: '10-15', descanso: '40-50 seg'},
                perda_gordura: {dias: 5, focus: [['peito', 'costas'], ['perna'], ['ombro', 'bíceps'], ['tríceps'], ['cardio']], sets: 3, reps: '12-20', descanso: '20-40 seg'}
            }
        };

        let treinoAtual = null;
        let dadosFormulario = {};

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function random(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function gerarTreino(biotipo, objetivo) {
            const estrutura = estruturaTreino[biotipo][objetivo];
            const dias = [];

            for (let i = 0; i < estrutura.dias; i++) {
                const gruposEscolhidos = estrutura.focus[i];
                const exercicios = [];

                gruposEscolhidos.forEach(grupo => {
                    if (exerciciosPorGrupo[grupo]) {
                        const exersDisponiveis = shuffle(exerciciosPorGrupo[grupo]);
                        const quantidade = random(2, 3);
                        
                        for (let j = 0; j < Math.min(quantidade, exersDisponiveis.length); j++) {
                            exercicios.push({
                                nome: exersDisponiveis[j],
                                series: estrutura.sets + random(-1, 1),
                                repeticoes: estrutura.reps,
                                descanso: estrutura.descanso
                            });
                        }
                    }
                });

                dias.push({
                    numero: i + 1,
                    grupos: gruposEscolhidos.join(' + '),
                    exercicios: exercicios
                });
            }

            return dias;
        }

        function renderizarTreino(treino) {
            const treinoList = document.getElementById('treinoList');
            treinoList.innerHTML = '';

            treino.forEach((dia) => {
                const div = document.createElement('div');
                div.className = 'treino-day';
                div.innerHTML = `
                    <div class="day-header">
                        <h2>DIA ${dia.numero} - ${dia.grupos}</h2>
                    </div>
                    ${dia.exercicios.map((ex, idx) => `
                        <div class="exercise-item">
                            <div class="exercise-name">${idx + 1}. ${ex.nome}</div>
                            <div class="exercise-details">
                                <strong>Séries:</strong> ${ex.series} | 
                                <strong>Repetições:</strong> ${ex.repeticoes} | 
                                <strong>Descanso:</strong> ${ex.descanso}
                            </div>
                        </div>
                    `).join('')}
                `;
                treinoList.appendChild(div);
            });

            document.getElementById('results').style.display = 'block';
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        window.gerarNovoTreino = function() {
            if (!dadosFormulario.biotipo || !dadosFormulario.objetivo) {
                alert('Por favor, preencha o formulário novamente');
                return;
            }
            
            treinoAtual = gerarTreino(dadosFormulario.biotipo, dadosFormulario.objetivo);
            renderizarTreino(treinoAtual);
        };

        window.salvarTreinoPDF = function() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const nome = document.getElementById('nome').value;
                const biotipo = document.getElementById('biotipo').value;
                const objetivo = document.getElementById('objetivo').value;
                
                let y = 20;
                doc.setFontSize(20);
                doc.text('TREINO PERSONALIZADO', 105, y, { align: 'center' });
                y += 10;
                doc.setFontSize(12);
                doc.text(`${nome}`, 105, y, { align: 'center' });
                y += 5;
                doc.setFontSize(10);
                doc.text(`Biotipo: ${biotipo} | Objetivo: ${objetivo}`, 105, y, { align: 'center' });
                y += 15;
                
                treinoAtual.forEach(dia => {
                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                    
                    doc.setFontSize(14);
                    doc.setFont(undefined, 'bold');
                    doc.text(`DIA ${dia.numero} - ${dia.grupos}`, 20, y);
                    y += 10;
                    
                    doc.setFont(undefined, 'normal');
                    doc.setFontSize(10);
                    
                    dia.exercicios.forEach((ex, idx) => {
                        if (y > 260) {
                            doc.addPage();
                            y = 20;
                        }
                        
                        doc.text(`${idx + 1}. ${ex.nome}`, 25, y);
                        y += 5;
                        doc.setFontSize(9);
                        doc.text(`Séries: ${ex.series} | Reps: ${ex.repeticoes} | Descanso: ${ex.descanso}`, 30, y);
                        y += 5;
                        doc.setFontSize(10);
                    });
                    
                    y += 5;
                });
                
                doc.save(`Treino_${nome}.pdf`);
                alert('✅ PDF baixado com sucesso!');
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao gerar PDF');
            }
        };

        document.querySelectorAll('[data-biotipo]').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('[data-biotipo]').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('biotipo').value = this.dataset.biotipo;
                dadosFormulario.biotipo = this.dataset.biotipo;
            });
        });

        document.querySelectorAll('[data-objetivo]').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('[data-objetivo]').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('objetivo').value = this.dataset.objetivo;
                dadosFormulario.objetivo = this.dataset.objetivo;
            });
        });

        document.getElementById('treinoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const user = auth.currentUser;
            if (!user) {
                alert('Faça login para gerar seu treino!');
                return;
            }

            dadosFormulario.biotipo = document.getElementById('biotipo').value;
            dadosFormulario.objetivo = document.getElementById('objetivo').value;

            treinoAtual = gerarTreino(dadosFormulario.biotipo, dadosFormulario.objetivo);
            renderizarTreino(treinoAtual);
        });
    </script>
</body>
</html>
