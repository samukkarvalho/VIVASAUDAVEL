<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhamento de Progresso - VidaSaudável AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --accent: #f59e0b;
            --dark: #0f172a;
            --gray: #64748b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #10b981, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        /* Card base */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        .card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Profile Card */
        .profile-section {
            text-align: center;
        }

        .photo-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 25px;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--primary);
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s;
        }

        .photo-container:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.5);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary);
        }

        .photo-placeholder p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
        }

        #photoInput {
            display: none;
        }

        .profile-info {
            text-align: left;
            margin-top: 20px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .info-value {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Chart Container */
        .chart-container {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            min-height: 300px;
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="number"],
        input[type="date"] {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .btn {
            padding: 16px 35px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Bebas Neue', sans-serif;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Progress Timeline */
        .timeline {
            margin-top: 30px;
        }

        .timeline-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 20px;
            align-items: center;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
        }

        .timeline-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .timeline-photo {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .timeline-data {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .timeline-metric {
            text-align: center;
        }

        .timeline-metric-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .timeline-metric-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .timeline-date {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .timeline-item {
                grid-template-columns: 1fr;
            }

            .timeline-data {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 0; }
            .header h1 { font-size: 2.5rem; }
            .header p { font-size: 0.9rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .card { padding: 20px; border-radius: 20px; }
            .card-title { font-size: 1.1rem; }
            .stat-number { font-size: 2rem; }
            .photo-container { width: 120px; height: 120px; }
            .timeline-data { grid-template-columns: 1fr; }
            input, select { padding: 12px; font-size: 0.95rem; }
            .btn { padding: 12px 24px; font-size: 0.9rem; }
        }
        
        @media (max-width: 480px) {
            .header h1 { font-size: 2rem; }
            .card { padding: 15px; }
            input[type="number"] { font-size: 16px; }
        }

        /* Canvas for charts */
        canvas {
            max-width: 100%;
            height: auto !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="display: inline-flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.1); padding: 12px 24px; border-radius: 50px; text-decoration: none; color: white; font-weight: 600; margin-bottom: 30px; transition: all 0.3s; border: 2px solid transparent;">
            <span style="font-size: 1.5rem;">←</span>
            Voltar para Início
        </a>
        
        <!-- Header -->
        <div class="header">
            <h1>MEU PROGRESSO</h1>
            <p>Acompanhe sua evolução e conquiste seus objetivos</p>
        </div>

        <!-- Dashboard -->
        <div class="dashboard-grid">
            <!-- Profile Card -->
            <div class="card profile-section">
                <div class="card-title">👤 Perfil</div>
                <div class="photo-container" onclick="document.getElementById('photoInput').click()">
                    <div class="photo-placeholder" id="photoPlaceholder">
                        📷
                        <p>Adicionar Foto</p>
                    </div>
                    <img id="profilePhoto" style="display: none;" alt="Foto de perfil">
                </div>
                <input type="file" id="photoInput" accept="image/*">
                
                <div class="profile-info" id="profileInfo">
                    <!-- Será preenchido dinamicamente -->
                </div>
            </div>

            <!-- Stats Overview -->
            <div class="card">
                <div class="card-title">📊 Visão Geral</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">⚖️</div>
                        <div class="stat-value" id="statPeso">--</div>
                        <div class="stat-label">Peso Atual (kg)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📉</div>
                        <div class="stat-value" id="statPerda">--</div>
                        <div class="stat-label">Variação (kg)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🎯</div>
                        <div class="stat-value" id="statRegistros">0</div>
                        <div class="stat-label">Registros</div>
                    </div>
                </div>

                <!-- Weight Chart -->
                <div class="chart-container">
                    <canvas id="weightChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Add New Record -->
        <div class="card">
            <div class="card-title">➕ Adicionar Registro</div>
            <form id="progressForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="recordDate">Data</label>
                        <input type="date" id="recordDate" required>
                    </div>
                    <div class="form-group">
                        <label for="recordPeso">Peso (kg)</label>
                        <input type="number" id="recordPeso" step="0.1" placeholder="70.5" required>
                    </div>
                    <div class="form-group">
                        <label for="recordAltura">Altura (cm)</label>
                        <input type="number" id="recordAltura" placeholder="170">
                    </div>
                    <div class="form-group">
                        <label for="recordPeito">Peito (cm)</label>
                        <input type="number" id="recordPeito" step="0.1" placeholder="95">
                    </div>
                    <div class="form-group">
                        <label for="recordCintura">Cintura (cm)</label>
                        <input type="number" id="recordCintura" step="0.1" placeholder="80">
                    </div>
                    <div class="form-group">
                        <label for="recordQuadril">Quadril (cm)</label>
                        <input type="number" id="recordQuadril" step="0.1" placeholder="95">
                    </div>
                    <div class="form-group">
                        <label for="recordBraco">Braço (cm)</label>
                        <input type="number" id="recordBraco" step="0.1" placeholder="35">
                    </div>
                    <div class="form-group">
                        <label for="recordCoxa">Coxa (cm)</label>
                        <input type="number" id="recordCoxa" step="0.1" placeholder="55">
                    </div>
                    <div class="form-group">
                        <label for="recordBf">BF% (opcional)</label>
                        <input type="number" id="recordBf" step="0.1" placeholder="15">
                    </div>
                </div>
                <button type="submit" class="btn">Salvar Registro</button>
            </form>
        </div>

        <!-- Progress Timeline -->
        <div class="card">
            <div class="card-title">📈 Histórico de Progresso</div>
            <div class="timeline" id="timeline">
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <p>Nenhum registro ainda. Adicione seu primeiro registro acima!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <script>
        // Storage
        const STORAGE_KEY = 'vidasaudavel_progress';
        let progressData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            profile: null,
            records: []
        };

        let weightChart = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            updateStats();
            renderTimeline();
            initChart();
            
            // Set today's date as default
            document.getElementById('recordDate').valueAsDate = new Date();
        });

        // Photo Upload
        document.getElementById('photoInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const photoData = event.target.result;
                    progressData.profile = { ...progressData.profile, photo: photoData };
                    saveData();
                    loadProfile();
                };
                reader.readAsDataURL(file);
            }
        });

        // Form Submit
        document.getElementById('progressForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const record = {
                id: Date.now(),
                date: document.getElementById('recordDate').value,
                peso: parseFloat(document.getElementById('recordPeso').value),
                altura: parseInt(document.getElementById('recordAltura').value) || null,
                peito: parseFloat(document.getElementById('recordPeito').value) || null,
                cintura: parseFloat(document.getElementById('recordCintura').value) || null,
                quadril: parseFloat(document.getElementById('recordQuadril').value) || null,
                braco: parseFloat(document.getElementById('recordBraco').value) || null,
                coxa: parseFloat(document.getElementById('recordCoxa').value) || null,
                bf: parseFloat(document.getElementById('recordBf').value) || null,
                photo: progressData.profile?.photo || null
            };

            progressData.records.push(record);
            progressData.records.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            saveData();
            updateStats();
            renderTimeline();
            updateChart();
            
            // Reset form
            e.target.reset();
            document.getElementById('recordDate').valueAsDate = new Date();
            
            alert('✅ Registro salvo com sucesso!');
        });

        function loadProfile() {
            if (progressData.profile?.photo) {
                document.getElementById('photoPlaceholder').style.display = 'none';
                const img = document.getElementById('profilePhoto');
                img.src = progressData.profile.photo;
                img.style.display = 'block';
            }

            // Show latest stats in profile
            if (progressData.records.length > 0) {
                const latest = progressData.records[progressData.records.length - 1];
                const profileInfo = document.getElementById('profileInfo');
                
                profileInfo.innerHTML = `
                    <div class="info-item">
                        <span class="info-label">Peso</span>
                        <span class="info-value">${latest.peso} kg</span>
                    </div>
                    ${latest.altura ? `
                    <div class="info-item">
                        <span class="info-label">Altura</span>
                        <span class="info-value">${latest.altura} cm</span>
                    </div>` : ''}
                    ${latest.bf ? `
                    <div class="info-item">
                        <span class="info-label">BF%</span>
                        <span class="info-value">${latest.bf}%</span>
                    </div>` : ''}
                    <div class="info-item">
                        <span class="info-label">IMC</span>
                        <span class="info-value">${calculateIMC(latest.peso, latest.altura)}</span>
                    </div>
                `;
            }
        }

        function calculateIMC(peso, altura) {
            if (!altura) return '--';
            const imc = peso / Math.pow(altura / 100, 2);
            return imc.toFixed(1);
        }

        function updateStats() {
            const records = progressData.records;
            
            if (records.length === 0) {
                document.getElementById('statPeso').textContent = '--';
                document.getElementById('statPerda').textContent = '--';
                document.getElementById('statRegistros').textContent = '0';
                return;
            }

            const latest = records[records.length - 1];
            const first = records[0];
            const variacao = latest.peso - first.peso;

            document.getElementById('statPeso').textContent = latest.peso.toFixed(1);
            document.getElementById('statPerda').textContent = (variacao >= 0 ? '+' : '') + variacao.toFixed(1);
            document.getElementById('statRegistros').textContent = records.length;
        }

        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            const records = progressData.records;

            if (records.length === 0) {
                timeline.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <p>Nenhum registro ainda. Adicione seu primeiro registro acima!</p>
                    </div>
                `;
                return;
            }

            timeline.innerHTML = records.reverse().map(record => `
                <div class="timeline-item">
                    ${record.photo ? `
                        <img src="${record.photo}" class="timeline-photo" alt="Foto do progresso">
                    ` : `
                        <div class="timeline-photo" style="display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05);">
                            <span style="font-size: 3rem;">📷</span>
                        </div>
                    `}
                    <div>
                        <div class="timeline-data">
                            <div class="timeline-metric">
                                <div class="timeline-metric-label">Peso</div>
                                <div class="timeline-metric-value">${record.peso} kg</div>
                            </div>
                            ${record.cintura ? `
                            <div class="timeline-metric">
                                <div class="timeline-metric-label">Cintura</div>
                                <div class="timeline-metric-value">${record.cintura} cm</div>
                            </div>` : ''}
                            ${record.braco ? `
                            <div class="timeline-metric">
                                <div class="timeline-metric-label">Braço</div>
                                <div class="timeline-metric-value">${record.braco} cm</div>
                            </div>` : ''}
                            ${record.bf ? `
                            <div class="timeline-metric">
                                <div class="timeline-metric-label">BF%</div>
                                <div class="timeline-metric-value">${record.bf}%</div>
                            </div>` : ''}
                        </div>
                        <div class="timeline-date">📅 ${formatDate(record.date)}</div>
                    </div>
                </div>
            `).join('');

            progressData.records.reverse(); // Restore order
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        }

        function initChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            
            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Peso (kg)',
                        data: [],
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        pointBackgroundColor: '#10b981',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            padding: 12,
                            titleColor: '#10b981',
                            bodyColor: '#fff',
                            borderColor: '#10b981',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.7)'
                            }
                        },
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.7)'
                            }
                        }
                    }
                }
            });

            updateChart();
        }

        function updateChart() {
            if (!weightChart) return;

            const records = progressData.records;
            const labels = records.map(r => formatDate(r.date));
            const data = records.map(r => r.peso);

            weightChart.data.labels = labels;
            weightChart.data.datasets[0].data = data;
            weightChart.update();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progressData));
        }
    </script>
</body>
</html>
