<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidaSaudável AI - Coach Virtual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: white; }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #10b981; }
        .chat-box { background: #1e293b; border-radius: 10px; padding: 20px; min-height: 400px; margin-bottom: 20px; }
        .message { margin: 10px 0; padding: 10px; border-radius: 8px; }
        .user { background: #8b5cf6; text-align: right; }
        .assistant { background: #10b981; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: none; background: #1e293b; color: white; }
        button { padding: 15px 30px; background: #10b981; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #059669; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💪 VidaSaudável AI - Seu Coach Virtual</h1>
        <div class="chat-box" id="chat"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Digite sua mensagem..." />
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        let historico = [];

        function addMsg(msg, tipo) {
            const div = document.createElement('div');
            div.className = 'message ' + tipo;
            div.textContent = msg;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function enviar() {
            const msg = input.value.trim();
            if (!msg) return;
            
            addMsg(msg, 'user');
            historico.push({ role: 'user', content: msg });
            input.value = '';
            
            const btn = document.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Pensando...';
            
            try {
                const res = await fetch('https://billowing-snowflake-2a74.saasouzaplay.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: historico })
                });
                
                const data = await res.json();
                
                if (data.message) {
                    addMsg(data.message, 'assistant');
                    historico.push({ role: 'assistant', content: data.message });
                } else {
                    addMsg('Erro: ' + (data.error || 'Resposta inválida'), 'assistant');
                }
            } catch (erro) {
                addMsg('Erro ao conectar: ' + erro.message, 'assistant');
                console.error(erro);
            }
            
            btn.disabled = false;
            btn.textContent = 'Enviar';
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviar();
        });

        addMsg('Olá! Sou seu coach de saúde virtual. Como posso te ajudar hoje?', 'assistant');
    </script>
</body>
</html>
