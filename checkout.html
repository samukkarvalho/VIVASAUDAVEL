<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Premium - VidaSaudável</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 50px auto; }
        .card {
            background: white;
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 { font-size: 2.5rem; color: #333; margin-bottom: 15px; text-align: center; }
        .subtitle { text-align: center; color: #666; font-size: 1.1rem; margin-bottom: 40px; }
        .pricing { text-align: center; margin: 40px 0; }
        .price {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .price-label { color: #999; font-size: 1.2rem; margin-top: 10px; }
        .features { margin: 40px 0; }
        .feature {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin: 10px 0;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 15px;
        }
        .feature-text { color: #333; font-size: 1rem; }
        .btn-checkout {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
        }
        .btn-checkout:disabled { opacity: 0.6; cursor: not-allowed; }
        .loading { display: none; text-align: center; margin-top: 20px; }
        .loading.active { display: block; }
        .spinner {
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🏋️ Premium</h1>
            <p class="subtitle">Vitalício</p>
            <div class="pricing">
                <div class="price">€20</div>
                <div class="price-label">Único</div>
            </div>
            <div class="features">
                <div class="feature"><span>✅</span><span class="feature-text">Ilimitado</span></div>
                <div class="feature"><span>✅</span><span class="feature-text">Histórico completo</span></div>
                <div class="feature"><span>✅</span><span class="feature-text">Gráficos</span></div>
                <div class="feature"><span>✅</span><span class="feature-text">PDF</span></div>
                <div class="feature"><span>✅</span><span class="feature-text">Offline</span></div>
            </div>
            <button id="checkoutBtn" class="btn-checkout">Pagar €20</button>
            <div class="loading" id="loading"><div class="spinner"></div></div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const app = initializeApp({
            apiKey: "AIzaSyCG7wlPmWepa8MVfuX4XZnxGnkxAEAbtDo",
            authDomain: "vidasaudavel-490d6.firebaseapp.com",
            projectId: "vidasaudavel-490d6"
        });

        const auth = getAuth(app);
        const stripe = Stripe('pk_test_51TI4390cmPNRQ5nXCZ1CAQ4t4StfQlyhOnvrr8T91bFexPYmO0WW5ikAWJsgO2IOWG0TOeDANKQNhPOeLTrsN5DX00N4o2wFR4');

        document.getElementById('checkoutBtn').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) { alert('Login!'); window.location.href = '/'; return; }

            document.getElementById('checkoutBtn').disabled = true;
            document.getElementById('loading').classList.add('active');

            try {
                const res = await fetch('/api/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user.uid, email: user.email, currency: 'eur' })
                });

                const { sessionId } = await res.json();
                await stripe.redirectToCheckout({ sessionId });
            } catch (e) {
                alert('Erro');
                document.getElementById('checkoutBtn').disabled = false;
                document.getElementById('loading').classList.remove('active');
            }
        });
    </script>
</body>
</html>
