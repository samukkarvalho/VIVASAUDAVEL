<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --accent: #f59e0b;
            --dark: #0f172a;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 60px; }
        .header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #10b981, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { font-size: 1.2rem; color: rgba(255, 255, 255, 0.7); }
        
        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 0 auto 50px;
        }
        .search-input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
        }
        .search-input::placeholder { color: rgba(255, 255, 255, 0.5); }
        
        /* Categories */
        .categories {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .category-btn {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .category-btn:hover, .category-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        
        /* Video Modal */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        .video-modal.show { display: flex; align-items: center; justify-content: center; }
        .video-content {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .close-btn:hover {
            background: var(--primary);
            transform: rotate(90deg);
        }
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.5);
        }
        .exercise-info h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 20px;
        }
        .exercise-details {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }
        .detail-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .detail-item:last-child { border-bottom: none; }
        .detail-label {
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 5px;
        }
        
        /* Exercise Grid */
        .exercises-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .exercise-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .exercise-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }
        .exercise-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .exercise-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }
        .exercise-muscle {
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 0; max-width: 100%; }
            .header h1 { font-size: 2rem; margin-bottom: 5px; }
            .header p { font-size: 0.85rem; }
            .search-input { 
                padding: 12px 16px; 
                font-size: 0.9rem;
                border-radius: 10px;
            }
            .exercises-grid { 
                grid-template-columns: 1fr; 
                gap: 12px;
            }
            .exercise-card { 
                padding: 15px;
                border-radius: 15px;
            }
            .exercise-icon { font-size: 2rem; }
            .exercise-name { font-size: 0.95rem; }
            .exercise-muscle { font-size: 0.75rem; }
            .categories { 
                gap: 6px;
                flex-wrap: wrap;
                margin-bottom: 15px;
            }
            .category-btn { 
                padding: 8px 14px; 
                font-size: 0.8rem;
                white-space: nowrap;
                border-radius: 10px;
            }
            .modal-content { 
                width: 95%; 
                margin: 10px auto;
                padding: 20px;
                border-radius: 15px;
            }
            .video-player { height: 220px; }
            /* Botão voltar */
            a[href="index.html"] { 
                padding: 8px 16px !important;
                font-size: 0.85rem !important;
                margin-bottom: 15px !important;
                border: none !important;
            }
            a[href="index.html"] span { font-size: 1.1rem !important; }
        }
        
        @media (max-width: 480px) {
            .header h1 { font-size: 1.7rem; }
            .exercise-card { padding: 12px; }
            .modal-content { padding: 15px; }
            .video-player { height: 200px; }
        }
    </style>
</head>

            const grid = document.getElementById('exercisesGrid');
            const filtered = exercises.filter(ex => {
                const matchCategory = currentCategory === 'todos' || ex.category === currentCategory;
                const matchSearch = ex.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                                  ex.muscle.toLowerCase().includes(currentSearch.toLowerCase());
                return matchCategory && matchSearch;
            });

            grid.innerHTML = filtered.map(ex => `
                <div class="exercise-card" onclick='openVideo(${JSON.stringify(ex)})'>
                    <div class="exercise-icon">${ex.icon}</div>
                    <div class="exercise-name">${ex.name}</div>
                    <div class="exercise-muscle">${ex.muscle}</div>
                </div>
            `).join('');
        }

        // Category buttons
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                renderExercises();
            });
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', function(e) {
            currentSearch = e.target.value;
            renderExercises();
        });

        // Open video modal
        function openVideo(exercise) {
            document.getElementById('modalTitle').textContent = exercise.name;
            document.getElementById('modalDescription').textContent = exercise.description;
            document.getElementById('modalMuscle').textContent = exercise.muscle;
            document.getElementById('modalTip').textContent = exercise.tip;
            document.getElementById('modalWarning').textContent = exercise.warning;
            
            // Biblioteca de vídeos do YouTube - Demonstrações profissionais
            const mediaLibrary = {
                // Vídeos de demonstração profissional estilo AnimatedMuscles
                // Links serão adicionados após busca no YouTube
                
                // PEITO
                'Supino Reto': 'https://www.youtube.com/embed/rT7DgCr-3pg',
                'Supino Inclinado': 'https://www.youtube.com/watch?v=WP1VLAt8hbM',
                'Supino Declinado': 'https://www.youtube.com/watch?v=J2g6qPBJfqo',
                'Crucifixo Reto': 'https://www.youtube.com/watch?v=uDMmccuPVPQ',
                'Crucifixo Inclinado': 'https://www.youtube.com/watch?v=uy9Xk3SVrms',
                'Flexão de Braço': 'https://www.youtube.com/watch?v=dHgoYiCraCw',
                'Paralelas': 'https://www.youtube.com/watch?v=LJz40nTE_sI',
                'Peck Deck': 'https://www.youtube.com/watch?v=FzCnfD0gOXo',
                'Cross Over': 'https://www.youtube.com/watch?v=jqTlJt3JXzQ',
                'Pullover': 'https://www.youtube.com/watch?v=-KaMXMMIVrU',
                
                // COSTAS
                'Barra Fixa': 'https://www.youtube.com/watch?v=thg6cGXSlvY',
                'Puxada Frontal': 'https://www.youtube.com/shorts/TScjTWFlkm0',
                'Puxada Triangulo': '',
                'Remada Curvada': '',
                'Remada Cavalinho': '',
                'Remada Unilateral': '',
                'Remada Baixa': '',
                'Levantamento Terra': 'https://www.youtube.com/embed/op9kVnSso6Q',
                'Encolhimento': '',
                'Pulldown': '',
                
                // OMBROS
                'Desenvolvimento Barra': '',
                'Desenvolvimento Halteres': '',
                'Elevação Lateral': '',
                'Elevação Frontal': '',
                'Elevação Posterior': '',
                'Remada Alta': '',
                'Arnold Press': '',
                'Crucifixo Inverso': '',
                
                // BRAÇOS
                'Rosca Direta Barra': '',
                'Rosca Alternada': '',
                'Rosca Martelo': '',
                'Rosca Scott': '',
                'Rosca Concentrada': '',
                'Tríceps Testa': '',
                'Tríceps Corda': '',
                'Tríceps Francês': '',
                'Mergulho Banco': '',
                'Tríceps Coice': '',
                
                // PERNAS
                'Agachamento Livre': 'https://www.youtube.com/embed/ultWZbUMPL8',
                'Agachamento Hack': '',
                'Leg Press 45°': '',
                'Cadeira Extensora': '',
                'Mesa Flexora': '',
                'Stiff': '',
                'Afundo': '',
                'Búlgaro': '',
                'Panturrilha em Pé': '',
                'Panturrilha Sentado': '',
                'Cadeira Adutora': '',
                'Cadeira Abdutora': '',
                
                // ABDÔMEN
                'Abdominal Supra': '',
                'Abdominal Infra': '',
                'Prancha': '',
                'Prancha Lateral': '',
                'Abdominal Bicicleta': '',
                'Elevação de Pernas Barra': '',
                'Abdominal Canivete': '',
                'Roda Abdominal': ''
            };
            
            const mediaUrl = mediaLibrary[exercise.name];
            
            if (mediaUrl) {
                // Se tem vídeo do YouTube disponível
                document.getElementById('videoPlayer').innerHTML = `
                    <iframe 
                        width="100%" 
                        height="100%" 
                        src="${mediaUrl}"
                        title="${exercise.name}"
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        style="border-radius: 15px;">
                    </iframe>
                `;
            } else {
                // Placeholder com animação CSS
                document.getElementById('videoPlayer').innerHTML = `
                    <div style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(245, 158, 11, 0.1)); border-radius: 15px;">
                        <div style="font-size: 5rem; margin-bottom: 20px; animation: pulse 2s infinite;">${exercise.icon}</div>
                        <div style="font-size: 1.3rem; font-weight: 700; margin-bottom: 10px;">${exercise.name}</div>
                        <div style="color: rgba(255,255,255,0.6); text-align: center; padding: 0 40px;">
                            <p style="margin-bottom: 15px;">💡 <strong>Dica:</strong> ${exercise.tip}</p>
                            <p>⚠️ <strong>Atenção:</strong> ${exercise.warning}</p>
                        </div>
                        <div style="margin-top: 30px; padding: 15px 30px; background: rgba(16, 185, 129, 0.2); border-radius: 50px; font-size: 0.9rem;">
                            🎥 Vídeo demonstrativo em breve
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('videoModal').classList.add('show');
        }

        // Close video
        function closeVideo() {
            document.getElementById('videoModal').classList.remove('show');
        }

        // Close on background click
        document.getElementById('videoModal').addEventListener('click', function(e) {
            if (e.target === this) closeVideo();
        });

        // Initial render
        renderExercises();
    </script>
    <script src="/translations.js"></script>
    <script>
        (function() {
            function initTranslation() {
                if (!localStorage.getItem('language')) localStorage.setItem('language', 'pt');
                const savedLang = localStorage.getItem('language') || 'pt';
                if (typeof setLanguage === 'function') {
                    setLanguage(savedLang);
                    document.querySelectorAll('.lang-btn').forEach(btn => {
                        btn.classList.remove('active');
                        if (btn.getAttribute('data-lang') === savedLang) btn.classList.add('active');
                    });
                }
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => setTimeout(initTranslation, 100));
            } else {
                setTimeout(initTranslation, 100);
            }
        })();
    </script>
</body>
</html>
