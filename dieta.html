<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Dieta - VidaSaudável</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 30px;
        }
        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .form-wrapper {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 30px;
            margin-top: 40px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }
        input, select {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .card.selected {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-color: var(--primary);
        }
        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(16,185,129,0.4);
        }
        .results {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 50px;
            margin-top: 40px;
        }
        .meal-container {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .meal-header {
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .meal-header h2 {
            font-size: 1.6rem;
            color: var(--primary);
        }
        .food-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            align-items: center;
        }
        .food-name {
            font-weight: 700;
            color: white;
        }
        .food-amount {
            color: var(--primary);
            font-weight: 700;
        }
        .food-macros {
            text-align: right;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }
        .button-group {
            text-align: center;
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-gerar {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 10px 30px rgba(16,185,129,0.4);
        }
        .btn-pdf {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 10px 30px rgba(245,158,11,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="display: inline-flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.1); padding: 12px 24px; border-radius: 50px; text-decoration: none; color: white; font-weight: 600; margin-bottom: 30px; transition: all 0.3s;">
            <span style="font-size: 1.5rem;">←</span>
            Voltar para Início
        </a>

        <div class="header">
            <h1>GERADOR DE DIETA</h1>
            <p>Crie seu plano alimentar personalizado</p>
        </div>

        <div class="form-wrapper">
            <form id="dietaForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="nome" required placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label>Peso (kg)</label>
                        <input type="number" id="peso" required placeholder="70" min="30" max="300">
                    </div>
                    <div class="form-group">
                        <label>Altura (cm)</label>
                        <input type="number" id="altura" required placeholder="170" min="100" max="250">
                    </div>
                </div>

                <div class="section-title">💪 Seu Biotipo</div>
                <div class="card-grid">
                    <div class="card" data-biotipo="ectomorfo">
                        <div class="card-icon">🏃</div>
                        <div class="card-title">Ectomorfo</div>
                        <small>Magro, metabolismo rápido</small>
                    </div>
                    <div class="card" data-biotipo="mesomorfo">
                        <div class="card-icon">💪</div>
                        <div class="card-title">Mesomorfo</div>
                        <small>Atlético, ganha fácil</small>
                    </div>
                    <div class="card" data-biotipo="endomorfo">
                        <div class="card-icon">🏋️</div>
                        <div class="card-title">Endomorfo</div>
                        <small>Robusto, metabolismo lento</small>
                    </div>
                </div>
                <input type="hidden" id="biotipo" required>

                <div class="section-title">🎯 Seu Objetivo</div>
                <div class="card-grid">
                    <div class="card" data-objetivo="ganho_massa">
                        <div class="card-icon">📈</div>
                        <div class="card-title">Ganho de Massa</div>
                    </div>
                    <div class="card" data-objetivo="definicao">
                        <div class="card-icon">⚡</div>
                        <div class="card-title">Definição</div>
                    </div>
                    <div class="card" data-objetivo="perda_gordura">
                        <div class="card-icon">🔥</div>
                        <div class="card-title">Perda de Gordura</div>
                    </div>
                </div>
                <input type="hidden" id="objetivo" required>

                <button type="submit" class="submit-btn">🥗 Gerar Minha Dieta</button>
            </form>
        </div>

        <div class="results" id="results" style="display:none;">
            <div style="text-align:center;margin-bottom:40px;">
                <h2 style="font-size:2.5rem;color:var(--primary);margin-bottom:10px;">✅ Sua Dieta Personalizada</h2>
            </div>
            <div id="dietaList"></div>
            <div class="button-group">
                <button class="btn-gerar" onclick="gerarNovaDieta()">🔄 Gerar Nova Dieta</button>
                <button class="btn-pdf" onclick="salvarDietaPDF()">📄 Salvar PDF</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const app = initializeApp({
            apiKey: "AIzaSyCG7wlPmWepa8MVfuX4XZnxGnkxAEAbtDo",
            authDomain: "vidasaudavel-490d6.firebaseapp.com",
            projectId: "vidasaudavel-490d6"
        });

        const auth = getAuth(app);
        const db = getFirestore(app);

        const alimentos = {
            cafe_manha: {
                proteina: ['Ovo mexido', 'Ovo cozido', 'Iogurte grego', 'Queijo cottage', 'Whey protein'],
                carboidrato: ['Pão integral', 'Aveia', 'Tapioca', 'Granola', 'Banana'],
                gordura: ['Amendoim', 'Amêndoas', 'Pasta de amendoim', 'Abacate'],
                fruta: ['Banana', 'Maçã', 'Morango', 'Laranja', 'Mamão']
            },
            almoço: {
                proteina: ['Frango grelhado', 'Peito de frango', 'Tilápia', 'Carne moída', 'Filé mignon', 'Peito de peru'],
                carboidrato: ['Arroz branco', 'Arroz integral', 'Batata doce', 'Batata inglesa', 'Macarrão integral', 'Quinoa'],
                vegetal: ['Brócolis', 'Couve', 'Alface', 'Tomate', 'Feijão', 'Cenoura'],
                gordura: ['Azeite', 'Abacate', 'Castanha', 'Óleo de coco']
            },
            lanche: {
                proteina: ['Whey protein', 'Ovo cozido', 'Iogurte grego', 'Queijo cottage'],
                carboidrato: ['Banana', 'Maçã', 'Pão integral', 'Tapioca', 'Aveia'],
                gordura: ['Castanha', 'Amendoim', 'Pasta de amendoim', 'Amêndoas']
            },
            jantar: {
                proteina: ['Frango grelhado', 'Peito de frango', 'Tilápia', 'Salmão', 'Atum', 'Ovo mexido'],
                carboidrato: ['Arroz integral', 'Batata doce', 'Macarrão integral', 'Batata inglesa'],
                vegetal: ['Brócolis', 'Alface', 'Cenoura', 'Couve', 'Tomate', 'Abobrinha']
            }
        };

        const estruturaDieta = {
            ectomorfo: {
                ganho_massa: {refeicoes: 5, cals_por_refeição: 500, desc: 'Alto volume para ganho'},
                definicao: {refeicoes: 4, cals_por_refeição: 400, desc: 'Moderado para definição'},
                perda_gordura: {refeicoes: 5, cals_por_refeição: 350, desc: 'Distribuído para queimar'}
            },
            mesomorfo: {
                ganho_massa: {refeicoes: 5, cals_por_refeição: 550, desc: 'Alto volume balanceado'},
                definicao: {refeicoes: 5, cals_por_refeição: 400, desc: 'Equilíbrio e definição'},
                perda_gordura: {refeicoes: 5, cals_por_refeição: 380, desc: 'Déficit moderado'}
            },
            endomorfo: {
                ganho_massa: {refeicoes: 4, cals_por_refeição: 600, desc: 'Concentrado em grandes refeições'},
                definicao: {refeicoes: 6, cals_por_refeição: 350, desc: 'Alta frequência, menos gordura'},
                perda_gordura: {refeicoes: 6, cals_por_refeição: 320, desc: 'Máximo volume, menos calorias'}
            }
        };

        let dietaAtual = null;
        let dadosFormulario = {};

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function random(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function gerarDieta(biotipo, objetivo) {
            const estrutura = estruturaDieta[biotipo][objetivo];
            const horarios = ['Café da manhã (7h)', 'Lanche (10h)', 'Almoço (13h)', 'Lanche (16h)', 'Jantar (20h)'];
            const refeicoes = [];

            for (let i = 0; i < estrutura.refeicoes; i++) {
                const horario = horarios[i];
                const tipo = i === 0 ? 'cafe_manha' : i === 2 ? 'almoço' : i === 4 ? 'jantar' : 'lanche';
                
                const alim = alimentos[tipo];
                const alimentos_escolhidos = [];

                ['proteina', 'carboidrato'].forEach(cat => {
                    if (alim[cat]) {
                        const lista = shuffle(alim[cat]);
                        alimentos_escolhidos.push({
                            nome: lista[0],
                            quantidade: random(100, 150),
                            tipo: cat
                        });
                    }
                });

                if (alim.vegetal && i !== 1 && i !== 3) {
                    const lista = shuffle(alim.vegetal);
                    alimentos_escolhidos.push({
                        nome: lista[0],
                        quantidade: random(100, 150),
                        tipo: 'vegetal'
                    });
                }

                refeicoes.push({
                    horario: horario,
                    alimentos: alimentos_escolhidos
                });
            }

            return refeicoes;
        }

        function renderizarDieta(refeicoes) {
            const dietaList = document.getElementById('dietaList');
            dietaList.innerHTML = '';
            dietaAtual = refeicoes;

            refeicoes.forEach(refeicao => {
                const div = document.createElement('div');
                div.className = 'meal-container';
                
                const alimentos_html = refeicao.alimentos.map(ali => `
                    <div class="food-item">
                        <div class="food-name">${ali.nome}</div>
                        <div class="food-amount">⚖️ ${ali.quantidade}g</div>
                        <div class="food-macros">${ali.tipo}</div>
                    </div>
                `).join('');

                div.innerHTML = `
                    <div class="meal-header">
                        <h2>🕐 ${refeicao.horario}</h2>
                    </div>
                    <div>${alimentos_html}</div>
                `;
                
                dietaList.appendChild(div);
            });

            document.getElementById('results').style.display = 'block';
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        window.gerarNovaDieta = function() {
            if (!dadosFormulario.biotipo || !dadosFormulario.objetivo) {
                alert('Por favor, preencha o formulário novamente');
                return;
            }
            
            dietaAtual = gerarDieta(dadosFormulario.biotipo, dadosFormulario.objetivo);
            renderizarDieta(dietaAtual);
        };

        window.salvarDietaPDF = function() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const nome = document.getElementById('nome').value;
                
                let y = 20;
                doc.setFontSize(20);
                doc.text('DIETA PERSONALIZADA', 105, y, { align: 'center' });
                y += 10;
                doc.setFontSize(12);
                doc.text(`${nome}`, 105, y, { align: 'center' });
                y += 15;
                
                dietaAtual.forEach(refeicao => {
                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                    
                    doc.setFontSize(14);
                    doc.setFont(undefined, 'bold');
                    doc.text(refeicao.horario, 20, y);
                    y += 10;
                    
                    doc.setFont(undefined, 'normal');
                    doc.setFontSize(10);
                    
                    refeicao.alimentos.forEach(ali => {
                        if (y > 260) {
                            doc.addPage();
                            y = 20;
                        }
                        doc.text(`• ${ali.nome} - ${ali.quantidade}g`, 25, y);
                        y += 6;
                    });
                    
                    y += 5;
                });
                
                doc.save(`Dieta_${nome}.pdf`);
                alert('✅ PDF baixado com sucesso!');
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao gerar PDF');
            }
        };

        document.querySelectorAll('[data-biotipo]').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('[data-biotipo]').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('biotipo').value = this.dataset.biotipo;
                dadosFormulario.biotipo = this.dataset.biotipo;
            });
        });

        document.querySelectorAll('[data-objetivo]').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('[data-objetivo]').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('objetivo').value = this.dataset.objetivo;
                dadosFormulario.objetivo = this.dataset.objetivo;
            });
        });

        document.getElementById('dietaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const user = auth.currentUser;
            if (!user) {
                alert('Faça login para gerar sua dieta!');
                return;
            }

            dadosFormulario.biotipo = document.getElementById('biotipo').value;
            dadosFormulario.objetivo = document.getElementById('objetivo').value;

            dietaAtual = gerarDieta(dadosFormulario.biotipo, dadosFormulario.objetivo);
            renderizarDieta(dietaAtual);
        });
    </script>
</body>
</html>
